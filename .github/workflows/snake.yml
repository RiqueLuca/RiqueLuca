name: generate snake animation

on:
  schedule:
    - cron: "0 */24 * * *"   # roda a cada 24h
  workflow_dispatch:          # permite rodar manualmente pela aba Actions
  push:
    branches:
      - main                  # <- estava "master", por isso não disparava

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # 1) Gera os SVGs em ./dist
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 2) Publica os SVGs no branch "output" (esse passo faltava!)
      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
